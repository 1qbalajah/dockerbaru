services:
  # Load Balancer (nginx) — port 8080:80 untuk akses user
  lb:
    image: nginx:alpine
    container_name: ekspedisi-lb
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - network-ujikom

  # Database (MySQL) — port 3306:3306
  db:
    image: mysql:8.4
    container_name: ekspedisi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ekspedisi_online
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
    ports:
      - "3306:3306"
    volumes:
      - volume-ujikom:/var/lib/mysql
    networks:
      - network-ujikom

  # App Container 1 — hanya expose (tidak akses langsung dari host)
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekspedisi-app-1
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_NODE_NAME=Anterin 1
      - DATABASE_URL=mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_online
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - network-ujikom

  # App Container 2 — hanya expose (tidak akses langsung dari host)
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekspedisi-app-2
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_NODE_NAME=Anterin 2
      - DATABASE_URL=mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_online
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - network-ujikom

  # App Container 3 — hanya expose (tidak akses langsung dari host)
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekspedisi-app-3
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_NODE_NAME=Anterin 3
      - DATABASE_URL=mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_online
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - network-ujikom

volumes:
  volume-ujikom:
  uploads_data:

networks:
  network-ujikom:
    driver: bridge